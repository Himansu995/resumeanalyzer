<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Resume Analyzer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/">
            Resume Analyzer
        </a>

        <div class="ms-auto">

            <a href="/resumes"
               class="btn btn-outline-light me-2">
                Dashboard
            </a>

            <a href="/logout"
               class="btn btn-danger">
                Logout
            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="mb-4">
                Upload Resume
            </h2>

            <form
                    action="/uploadResume"
                    method="post"
                    enctype="multipart/form-data">

                <div class="mb-3">

                    <label class="form-label">
                        Full Name
                    </label>

                    <input
                            type="text"
                            name="fullName"
                            class="form-control"
                            required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Email
                    </label>

                    <input
                            type="email"
                            name="email"
                            class="form-control"
                            required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Resume (PDF)
                    </label>

                    <input
                            type="file"
                            name="file"
                            accept=".pdf"
                            class="form-control"
                            required>

                </div>

                <button
                        class="btn btn-primary">

                    Upload Resume

                </button>

            </form>

        </div>

    </div>

</div>

</body>

</html>
