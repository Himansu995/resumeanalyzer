<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer</title>
</head>
<body>

<h1>Resume Analyzer</h1>

<form action="/api/resumes/upload"
      method="post"
      enctype="multipart/form-data">

    <input type="text"
           name="fullName"
           placeholder="Full Name">

    <br><br>

    <input type="email"
           name="email"
           placeholder="Email">

    <br><br>

    <input type="file"
           name="file">

    <br><br>

    <button type="submit">
        Upload Resume
    </button>

</form>

</body>
</html>
