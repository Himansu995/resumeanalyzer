<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Resume Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            Resume Analyzer
        </a>

        <a href="/upload" class="btn btn-success">
            Upload Resume
        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3 class="mb-0">
                Resume Dashboard
            </h3>

        </div>

        <div class="card-body">

            <form
                    action="/resumes"
                    method="get"
                    class="row mb-4">

                <div class="col-md-10">

                    <input
                            type="text"
                            class="form-control"
                            placeholder="Search by Name or Email"
                            name="keyword"
                            th:value="${keyword}">

                </div>

                <div class="col-md-2">

                    <button
                            class="btn btn-primary w-100"
                            type="submit">

                        Search

                    </button>

                </div>

            </form>

            <table class="table table-bordered table-hover table-striped align-middle">

                <thead class="table-dark">

                <tr>

                    <th>#</th>

                    <th>Name</th>

                    <th>Email</th>

                    <th>Resume File</th>


                    <th>Actions</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="resume, stat : ${resumes}">

                    <td th:text="${stat.count}"></td>

                    <td th:text="${resume.fullName}"></td>

                    <td th:text="${resume.email}"></td>

                    <td th:text="${resume.resumeFileName}"></td>



                    <td>

                        <a
                                th:href="@{/resume/{id}(id=${resume.id})}"
                                class="btn btn-info btn-sm">

                            View

                        </a>

                        <a
                                th:href="@{/download/{id}(id=${resume.id})}"
                                class="btn btn-primary btn-sm">

                            Download

                        </a>

                        <a
                                th:href="@{/delete/{id}(id=${resume.id})}"
                                class="btn btn-danger btn-sm">

                            Delete

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
