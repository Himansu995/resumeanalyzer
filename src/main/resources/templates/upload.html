<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Resume Analyzer</title>
</head>

<body>

<h1>Upload Resume</h1>

<form
        action="/uploadResume"
        method="post"
        enctype="multipart/form-data">

    <label>Full Name</label>
    <br>
    <input
            type="text"
            name="fullName"
            required>

    <br><br>

    <label>Email</label>
    <br>
    <input
            type="email"
            name="email"
            required>

    <br><br>

    <label>Select Resume</label>
    <br>
    <input
            type="file"
            name="file"
            accept=".pdf"
            required>

    <br><br>

    <button type="submit">
        Upload Resume
    </button>

</form>

</body>
</html>
